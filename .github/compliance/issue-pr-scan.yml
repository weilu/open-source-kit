name: Issue & PR Content Scan
on:
  issues: { types: [opened, edited] }
  pull_request_target: { types: [opened, edited, synchronize] }
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue?.title || context.payload.pull_request?.title || "";
            const body  = context.payload.issue?.body  || context.payload.pull_request?.body  || "";
            const blob = `${title}\n\n${body}`;
            const patterns = [
              /password\s*[:=]\s*\S+/i,
              /api[_-]?key\s*[:=]\s*\S+/i,
              /AKIA[0-9A-Z]{16}/g,
              /secret(access|_access)?_key/i,
              /(s3|postgres|mysql|mongodb):\/\/[^ \n]+/i,
              /file:\/\/\/[A-Za-z0-9/_\-.]+/i,
              /\binternal\.[A-Za-z0-9.-]+\b/i
            ];
            const hits = patterns.flatMap(p => (blob.match(p) || []).map(m => ({p: p.toString(), m})));
            if (hits.length) {
              const msg = hits.map(h => `- \`${h.m}\` via ${h.p}`).join('\n');
              core.setFailed(`Potential secrets/internal refs found:\n${msg}`);
            }

